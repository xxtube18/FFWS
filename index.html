<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FFWS - Tabela e MVP</title>
    <style>
        :root { --gold: #ffcc00; --red: #ff4444; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        
        .section-title { color: var(--gold); text-transform: uppercase; border-left: 5px solid var(--gold); padding-left: 15px; margin: 40px 0 20px; }
        
        .upload-section { background: var(--card); border: 2px dashed #333; padding: 20px; text-align: center; border-radius: 12px; }
        .btn-upload { background: var(--gold); color: black; padding: 12px 25px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); margin-bottom: 30px; border-radius: 8px; overflow: hidden; }
        th { background: #222; color: #888; padding: 12px; font-size: 12px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #222; }

        /* Estilo MVP */
        .mvp-1 { background: rgba(255, 204, 0, 0.15); font-weight: bold; }
        .mvp-1 .rank { color: var(--gold); font-size: 1.5em; }
        .kill-badge { background: var(--red); color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-section">
        <h2>SISTEMA FFWS BR</h2>
        <input type="file" id="inputFotos" multiple accept="image/*" style="display:none">
        <button class="btn-upload" onclick="document.getElementById('inputFotos').click()">IMPORTAR PRINTS</button>
    </div>

    <h3 class="section-title">Classificação Geral (Equipes)</h3>
    <table>
        <thead>
            <tr>
                <th>POS</th>
                <th>TIME</th>
                <th>KILLS</th>
                <th>PTS POS</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody id="corpoTimes"></tbody>
    </table>

    <h3 class="section-title">TOP 3 MVP (Maiores Abates)</h3>
    <table style="max-width: 600px; margin-left: 0;">
        <thead>
            <tr>
                <th>RANK</th>
                <th>JOGADOR</th>
                <th>TIME</th>
                <th>ABATES</th>
            </tr>
        </thead>
        <tbody id="corpoMVP"></tbody>
    </table>
</div>

<script>
    const pontosFFWS = [12, 9, 8, 7, 6, 5, 4, 3, 2, 1, 0, 0];

    document.getElementById('inputFotos').addEventListener('change', function(e) {
        // Dados extraídos da sua print para o exemplo
        // Formato: { nick, kills, tag }
        const jogadoresGeral = [
            { nick: "CW Brence9J", kills: 10, tag: "CW" },
            { nick: "João7$haha", kills: 9, tag: "João" },
            { nick: "NW! ThurKzk", kills: 9, tag: "SIX" },
            { nick: "NXT Gabiroto", kills: 10, tag: "NXT" },
            { nick: "SIX Isaque x7", kills: 5, tag: "SIX" },
            { nick: "DanixR:)", kills: 5, tag: "NXT" },
            { nick: "CW JAPA33", kills: 3, tag: "CW" }
            // ... (O sistema leria todos os 40 aqui)
        ];

        // Lógica para Tabela de Times (Soma dos 4 de cada slot)
        const timesResumo = [
            { nome: "SIX", kills: 25, ptsPos: 9, total: 34 },
            { nome: "NXT", kills: 21, ptsPos: 8, total: 29 },
            { nome: "CW", kills: 15, ptsPos: 12, total: 27 }
        ];

        renderizarTabelas(timesResumo, jogadoresGeral);
    });

    function renderizarTabelas(times, jogadores) {
        // 1. Renderizar Times (Ordenado por Total)
        const tBodyTimes = document.getElementById('corpoTimes');
        tBodyTimes.innerHTML = "";
        times.sort((a,b) => b.total - a.total).forEach((t, i) => {
            tBodyTimes.innerHTML += `<tr><td>${i+1}º</td><td><b>${t.nome}</b></td><td>${t.kills}</td><td>${t.ptsPos}</td><td style="color:var(--gold)"><b>${t.total}</b></td></tr>`;
        });

        // 2. Renderizar MVP (Ordenado por Kills)
        const tBodyMVP = document.getElementById('corpoMVP');
        tBodyMVP.innerHTML = "";
        
        // Ordena os jogadores por quem matou mais
        jogadores.sort((a,b) => b.kills - a.kills);

        // Pega apenas os 3 primeiros para o TOP 3
        jogadores.slice(0, 3).forEach((j, i) => {
            const destaque = i === 0 ? 'class="mvp-1"' : '';
            tBodyMVP.innerHTML += `
                <tr ${destaque}>
                    <td class="rank">${i+1}º</td>
                    <td>${j.nick}</td>
                    <td>${j.tag}</td>
                    <td><span class="kill-badge">${j.kills} KILLS</span></td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
